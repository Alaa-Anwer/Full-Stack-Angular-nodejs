<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" routerLink="/">
      <strong>🛍️ E-Commerce</strong>
    </a>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-lg-center flex-wrap">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            Home
          </a>
        </li>

        @if (!(currentUser$ | async)) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active">
              Login
            </a>
          </li>

          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/register"
              routerLinkActive="active"
            >
              Register
            </a>
          </li>
        }

        @if (currentUser$ | async; as user) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/cart" routerLinkActive="active">
              Cart
              @if ((cartCount$ | async)! > 0) {
                <span class="badge bg-danger">{{ cartCount$ | async }}</span>
              }
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="/orders" routerLinkActive="active">
              Orders
            </a>
          </li>

          @if (user.role === "admin") {
            <li class="nav-item">
              <a class="nav-link" routerLink="/admin" routerLinkActive="active">
                Admin Dashboard
              </a>
            </li>
          }

          <li class="nav-item dropdown user-dropdown">
            <button
              class="nav-link dropdown-toggle user-name bg-transparent border-0"
              type="button"
              id="userDropdown"
              data-bs-toggle="dropdown"
              [attr.title]="user.name"
              aria-expanded="false"
            >
              {{ user.name }}
            </button>
            <ul
              class="dropdown-menu dropdown-menu-end"
              aria-labelledby="userDropdown"
            >
              <li>
                <button class="dropdown-item" type="button" (click)="logout()">
                  Logout
                </button>
              </li>
            </ul>
          </li>
        }
      </ul>
    </div>
  </div>
</nav>
